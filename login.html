<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In | VCO - RTM Bot</title>
    <link rel="stylesheet" href="styles.css?v=20260701-1" />
  </head>
  <body class="auth-body" data-theme="dark">
    <main class="auth-card">
      <div class="brand auth-brand">
        <div class="brand-mark">VCO</div>
        <div class="brand-copy">
          <h1>RTM Command Center</h1>
          <p>Secure Data Governance</p>
        </div>
      </div>
      <form class="auth-form" method="post" action="/api/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required autofocus />
        <p id="loginError" class="login-error" hidden>Incorrect password.</p>
        <button type="submit"><i data-lucide="log-in"></i><span>Sign in</span></button>
      </form>
      <a class="auth-back" href="index.html"><i data-lucide="arrow-left"></i><span>Back to overview</span></a>
    </main>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script>
      document.getElementById("loginError").hidden = !new URLSearchParams(window.location.search).has("error");
      window.lucide?.createIcons();
    </script>
  </body>
</html>

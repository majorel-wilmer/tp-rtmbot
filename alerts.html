<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alert Queue | VCO - RTM Bot</title>
    <link rel="stylesheet" href="styles.css?v=20260701-1" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">VCO</div>
        <div class="brand-copy">
          <h1>RTM Command Center</h1>
          <p>VCO Intelligence Suite</p>
        </div>
      </div>

      <nav class="page-nav" aria-label="Dashboard pages">
        <span class="nav-section-label">Operations</span>
        <a href="index.html"><i data-lucide="layout-dashboard"></i><span>Executive Overview</span></a>
        <a href="rollout.html"><i data-lucide="calendar-range"></i><span>Rollout &amp; Analysis</span></a>
        <a class="active" href="alerts.html" aria-current="page"><i data-lucide="triangle-alert"></i><span>Alert Queue</span></a>
        <span class="nav-section-label governance">Data Governance</span>
        <a href="/api/data_management"><i data-lucide="database"></i><span>Data Management</span></a>
      </nav>

      <button class="theme-toggle" type="button" data-theme-toggle><i data-lucide="moon"></i><span>Dark mode</span></button>

      <section class="filters">
        <h2><i data-lucide="sliders-horizontal"></i> View Filters</h2>
        <label>
          Client
          <select id="clientFilter"></select>
        </label>
        <label>
          Status
          <select id="statusFilter">
            <option value="">All statuses</option>
            <option value="PASS">PASS</option>
            <option value="FAIL">FAIL</option>
            <option value="Needs Review">Needs Review</option>
          </select>
        </label>
      </section>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <span class="page-eyebrow">VCO / Data Quality</span>
          <h1>Alert Queue</h1>
          <p id="dataSubtitle">Alert-level validation and findings</p>
        </div>
        <button id="exportButton" type="button"><i data-lucide="download"></i><span>Export Alert CSV</span></button>
      </header>

      <section class="panel table-panel alert-page-panel">
        <div class="panel-head">
          <h2>Alert Queue</h2>
          <span id="rowCount"></span>
        </div>
        <div class="table-wrap alert-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Client</th><th>Audit Date</th><th>Category</th><th>Alert</th>
                <th>Status</th><th>Fail Checks</th><th>Notes</th>
              </tr>
            </thead>
            <tbody id="alertRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="data/actual_data.js"></script>
    <script src="script.js?v=20260701-1"></script>
  </body>
</html>
